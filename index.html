<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BİLSEM SERA PROJESİ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --border: rgba(255,255,255,0.1);
            --c1: #00d2ff; --c2: #9d50bb; --c3: #00ff88; --c4: #ff3333;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 30px 30px;
            font-family: 'Segoe UI', sans-serif; color: var(--text); margin: 0; padding-bottom: 100px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(15px); sticky; top: 0; z-index: 1000;
        }

        .conn-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; transition: 0.3s; }
        .dot.online { background: #00ff88; box-shadow: 0 0 15px #00ff88; }

        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; padding: 25px; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: rgba(20, 20, 20, 0.7); border: 2px solid var(--border);
            border-radius: 20px; padding: 20px; position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 250px; display: flex; flex-direction: column;
        }

        /* Renkli Kartlar ve Hover Efektleri */
        .card-1 { border-color: rgba(0, 210, 255, 0.2); } .card-1:hover { box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); border-color: var(--c1); }
        .card-2 { border-color: rgba(157, 80, 187, 0.2); } .card-2:hover { box-shadow: 0 0 30px rgba(157, 80, 187, 0.3); border-color: var(--c2); }
        .card-3 { border-color: rgba(0, 255, 136, 0.2); } .card-3:hover { box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); border-color: var(--c3); }
        .card-4 { border-color: rgba(255, 51, 51, 0.2); } .card-4:hover { box-shadow: 0 0 30px rgba(255, 51, 51, 0.3); border-color: var(--c4); }

        .card-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; opacity: 0.7; }
        
        .main-data { display: flex; align-items: center; gap: 20px; margin: 15px 0; }
        .nem-val { font-size: 56px; font-weight: 900; }
        
        /* NEM BARI */
        .nem-bar-bg { width: 15px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .nem-bar-fill { width: 100%; height: 0%; transition: 0.5s ease-out; }

        .chart-container { flex-grow: 1; position: relative; height: 100px !important; width: 100%; margin-top: 10px; }

        .footer {
            position: fixed; bottom: 0; width: 100%; background: #000;
            padding: 15px; display: flex; justify-content: space-around;
            border-top: 1px solid var(--border); font-size: 11px; color: #ff8800; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:#ff8800; margin:0;">⚡ BİLSEM SERA</h2>
        <div class="conn-box">
            <div id="main-dot" class="dot"></div>
            <span id="main-text">BAGLANTI YOK</span>
            <span style="cursor:pointer; margin-left:15px;" onclick="document.body.classList.toggle('light-mode')">🌓</span>
        </div>
    </div>

    <div class="grid">
        <div class="card card-1">
            <div class="card-header"><span>ÜNİTE_01</span> <span>SU AKTARIMI <div id="p1" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
            <div class="main-data">
                <div class="nem-val" id="n1">0</div><small style="color:var(--c1)">%</small>
                <div class="nem-bar-bg"><div id="b1" class="nem-bar-fill" style="background:var(--c1)"></div></div>
            </div>
            <div class="chart-container"><canvas id="c1"></canvas></div>
        </div>

        <div class="card card-2">
            <div class="card-header"><span>ÜNİTE_02</span> <span>SU AKTARIMI <div id="p2" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
            <div class="main-data">
                <div class="nem-val" id="n2">0</div><small style="color:var(--c2)">%</small>
                <div class="nem-bar-bg"><div id="b2" class="nem-bar-fill" style="background:var(--c2)"></div></div>
            </div>
            <div class="chart-container"><canvas id="c2"></canvas></div>
        </div>

        <div class="card card-3">
            <div class="card-header"><span>ÜNİTE_03</span> <span>SU AKTARIMI <div id="p3" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
            <div class="main-data">
                <div class="nem-val" id="n3">0</div><small style="color:var(--c3)">%</small>
                <div class="nem-bar-bg"><div id="b3" class="nem-bar-fill" style="background:var(--c3)"></div></div>
            </div>
            <div class="chart-container"><canvas id="c3"></canvas></div>
        </div>

        <div class="card card-4">
            <div class="card-header"><span>ÜNİTE_04</span> <span>SU AKTARIMI <div id="p4" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
            <div class="main-data">
                <div class="nem-val" id="n4">0</div><small style="color:var(--c4)">%</small>
                <div class="nem-bar-bg"><div id="b4" class="nem-bar-fill" style="background:var(--c4)"></div></div>
            </div>
            <div class="chart-container"><canvas id="c4"></canvas></div>
        </div>
    </div>

    <div class="footer">
        <div>DURUM: <span id="f-durum">BEKLİYOR</span></div>
        <div>PAKET: <span id="f-paket">0</span></div>
        <div>SİSTEM: <span>LGS.OS V2.3</span></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bilsem1717-60b7a-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);

        const charts = {};
        const colors = ['#00d2ff', '#9d50bb', '#00ff88', '#ff3333'];

        const initChart = (id, color) => {
            const ctx = document.getElementById(id);
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: [], borderColor: color, backgroundColor: color + '22',
                        fill: true, tension: 0.4, pointRadius: 0, borderWidth: 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }
                }
            });
        };

        ['c1', 'c2', 'c3', 'c4'].forEach((id, i) => initChart(id, colors[i]));

        let count = 0;
        firebase.database().ref('/veriler').on('value', (s) => {
            const d = s.val(); if(!d) return;
            count++;
            document.getElementById('main-dot').className = 'dot online';
            document.getElementById('main-text').innerText = 'BAĞLANDI';
            document.getElementById('f-paket').innerText = count;

            for(let i=1; i<=4; i++) {
                const n = d[`nem${i}`] || 0;
                const p = d[`pompa${i}`] || 0;

                document.getElementById(`n${i}`).innerText = n;
                document.getElementById(`p${i}`).className = p == 1 ? 'dot online' : 'dot';
                document.getElementById(`b${i}`).style.height = n + '%'; // Eski nem barı

                const chart = charts[`c${i}`];
                chart.data.datasets[0].data.push(n);
                if(chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
                chart.update();
            }
        });
    </script>
</body>
</html>
