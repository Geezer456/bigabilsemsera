<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gezgin A.Ş. — Akıllı Sera Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #ff8800;
            --primary-glow: rgba(255, 136, 0, 0.6);
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.6);
            --text: #ddd;
            --border: #222;
            --grid-color: rgba(255, 255, 255, 0.03);
            --header-bg: #000;
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card: rgba(255, 255, 255, 0.9);
            --text: #333;
            --border: #ddd;
            --grid-color: rgba(0, 0, 0, 0.05);
            --header-bg: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .top-header {
            width: 100%; height: 60px;
            background: var(--header-bg);
            border-bottom: 2px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: sticky; top: 0; z-index: 1000;
        }

        .logo { color: var(--primary); font-weight: bold; font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary-glow); }

        .btn {
            padding: 6px 12px; font-size: 10px; border: 1px solid var(--primary);
            background: transparent; color: var(--primary); cursor: pointer;
            font-weight: bold; border-radius: 12px; transition: 0.3s;
        }
        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary-glow); }

        /* 2x2 DÜZENİ İÇİN WRAPPER */
        .main-wrapper {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Tam 2 sütun */
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container {
            background: var(--card);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        /* LGS.OS HOVER PARLAMASI */
        .container:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow), inset 0 0 10px var(--primary-glow);
        }

        .saksi-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .saksi-name { font-size: 11px; font-weight: bold; color: var(--text); opacity: 0.7; letter-spacing: 1px; }
        
        .nem-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
        .nem-value { font-size: 36px; font-weight: bold; color: var(--text); } /* Neon yok, sade */
        .nem-label { font-size: 12px; color: var(--primary); font-weight: bold; }

        .pump-status { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .dot.active { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

        .chart-box { height: 100px; width: 100%; margin-top: 10px; }

        /* FOOTER */
        .status-footer-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--card); border-top: 2px solid var(--border);
            padding: 12px 20px; display: flex; justify-content: center; gap: 30px;
            font-size: 10px; font-weight: bold; letter-spacing: 1px;
        }
        .footer-item span { color: var(--primary); }

        @media (max-width: 700px) { .main-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo">⚡ GEZGİN A.Ş.</div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="document.body.classList.toggle('light-mode')">TEMA</button>
            <div class="btn" id="conn-stat">ÇEVRİMDIŞI</div>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="container">
            <div class="saksi-header">
                <div class="saksi-name">UNIT_01</div>
                <div class="pump-status">PUMP <div id="p1-dot" class="dot"></div></div>
            </div>
            <div class="nem-row">
                <div class="nem-value" id="n1-text">0</div>
                <div class="nem-label">% NEM</div>
            </div>
            <div class="chart-box"><canvas id="chart1"></canvas></div>
        </div>

        <div class="container">
            <div class="saksi-header">
                <div class="saksi-name">UNIT_02</div>
                <div class="pump-status">PUMP <div id="p2-dot" class="dot"></div></div>
            </div>
            <div class="nem-row">
                <div class="nem-value" id="n2-text">0</div>
                <div class="nem-label">% NEM</div>
            </div>
            <div class="chart-box"><canvas id="chart2"></canvas></div>
        </div>

        <div class="container">
            <div class="saksi-header">
                <div class="saksi-name">UNIT_03</div>
                <div class="pump-status">PUMP <div id="p3-dot" class="dot"></div></div>
            </div>
            <div class="nem-row">
                <div class="nem-value" id="n3-text">0</div>
                <div class="nem-label">% NEM</div>
            </div>
            <div class="chart-box"><canvas id="chart3"></canvas></div>
        </div>

        <div class="container">
            <div class="saksi-header">
                <div class="saksi-name">UNIT_04</div>
                <div class="pump-status">PUMP <div id="p4-dot" class="dot"></div></div>
            </div>
            <div class="nem-row">
                <div class="nem-value" id="n4-text">0</div>
                <div class="nem-label">% NEM</div>
            </div>
            <div class="chart-box"><canvas id="chart4"></canvas></div>
        </div>
    </div>

    <footer class="status-footer-bar">
        <div class="footer-item">STATUS: <span id="f-stat">IDLE</span></div>
        <div class="footer-item">DATA: <span id="f-count">0</span></div>
        <div class="footer-item">SYNC: <span id="f-time">--:--</span></div>
        <div class="footer-item">CORE: <span>LGS.OS_V2</span></div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://bilsem1717-60b7a-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const charts = {};
        const createChart = (id) => {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: [],
                        borderColor: '#ff8800',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(255, 136, 0, 0.1)'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { min: 0, max: 100, display: false } }
                }
            });
        };

        ['chart1', 'chart2', 'chart3', 'chart4'].forEach(id => charts[id] = createChart(id));

        let count = 0;
        database.ref('/veriler').on('value', (snap) => {
            const val = snap.val();
            if(!val) return;
            count++;
            
            document.getElementById('f-count').innerText = count;
            document.getElementById('f-time').innerText = new Date().toLocaleTimeString();
            document.getElementById('conn-stat').innerText = "CANLI";
            document.getElementById('f-stat').innerText = "RECEIVING";

            for(let i=1; i<=4; i++) {
                const nem = val[`nem${i}`] || 0;
                const pump = val[`pompa${i}`] || 0;

                document.getElementById(`n${i}-text`).innerText = nem;
                document.getElementById(`p${i}-dot`).className = pump ? 'dot active' : 'dot';

                const chart = charts[`chart${i}`];
                chart.data.datasets[0].data.push(nem);
                if(chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
                chart.update();
            }
        });
    </script>
</body>
</html>
