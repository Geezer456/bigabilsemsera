<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gezgin A.Ş. — Debug Mode</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff8800;
            --primary-glow: rgba(255, 136, 0, 0.4);
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
            --text: #ddd;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            margin: 0; padding: 20px;
            padding-bottom: 150px;
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .container {
            background: var(--card);
            border: 2px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
            position: relative;
            min-height: 220px; /* Kartın çökmemesi için */
        }

        .container:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .nem-value { font-size: 42px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        
        /* GRAFİK ALANI - KRİTİK NOKTA */
        .chart-box { 
            position: relative; 
            height: 120px; 
            width: 100%; 
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px dashed #333;
        }

        /* DEBUG PENCERESİ */
        #debug-console {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100px;
            background: #000; color: #0f0; font-family: monospace; font-size: 10px;
            padding: 10px; overflow-y: auto; border-top: 2px solid #333; z-index: 9999;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #333; }
        .active { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
    </style>
</head>
<body>

    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="color:var(--primary)">⚡ GEZGİN A.Ş. DASHBOARD</h2>
        <p style="font-size:10px; opacity:0.5;">LGS.OS THEME V2.1 - DEBUG ACTIVE</p>
    </div>

    <div class="main-wrapper">
        <div class="container">
            <div style="display:flex; justify-content:space-between;"><span>UNIT_01</span> <div id="p1" class="dot"></div></div>
            <div class="nem-value"><span id="n1">0</span><small style="font-size:14px">%</small></div>
            <div class="chart-box"><canvas id="c1"></canvas></div>
        </div>
        <div class="container">
            <div style="display:flex; justify-content:space-between;"><span>UNIT_02</span> <div id="p2" class="dot"></div></div>
            <div class="nem-value"><span id="n2">0</span><small style="font-size:14px">%</small></div>
            <div class="chart-box"><canvas id="c2"></canvas></div>
        </div>
        <div class="container">
            <div style="display:flex; justify-content:space-between;"><span>UNIT_03</span> <div id="p3" class="dot"></div></div>
            <div class="nem-value"><span id="n3">0</span><small style="font-size:14px">%</small></div>
            <div class="chart-box"><canvas id="c3"></canvas></div>
        </div>
        <div class="container">
            <div style="display:flex; justify-content:space-between;"><span>UNIT_04</span> <div id="p4" class="dot"></div></div>
            <div class="nem-value"><span id="n4">0</span><small style="font-size:14px">%</small></div>
            <div class="chart-box"><canvas id="c4"></canvas></div>
        </div>
    </div>

    <div id="debug-console">--- SISTEM BASLATILDI ---<br></div>

    <script>
        const logger = (msg) => {
            const div = document.getElementById('debug-console');
            div.innerHTML += `> ${new Date().toLocaleTimeString()}: ${msg}<br>`;
            div.scrollTop = div.scrollHeight;
        };

        try {
            const firebaseConfig = { databaseURL: "https://bilsem1717-60b7a-default-rtdb.europe-west1.firebasedatabase.app" };
            firebase.initializeApp(firebaseConfig);
            logger("Firebase Baglantisi Kuruldu.");
        } catch(e) { logger("FIREBASE HATASI: " + e.message); }

        const charts = {};
        const setupChart = (id) => {
            try {
                const ctx = document.getElementById(id);
                if(!ctx) { logger(`Hata: ${id} canvas bulunamadi!`); return; }
                
                charts[id] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Array(20).fill(''),
                        datasets: [{
                            data: [],
                            borderColor: '#ff8800',
                            backgroundColor: 'rgba(255, 136, 0, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }
                    }
                });
                logger(`Grafik ${id} basariyla olusturuldu.`);
            } catch(e) { logger(`GRAFIK HATASI (${id}): ` + e.message); }
        };

        // Grafikleri Baslat
        ['c1', 'c2', 'c3', 'c4'].forEach(id => setupChart(id));

        firebase.database().ref('/veriler').on('value', (snap) => {
            const data = snap.val();
            if(!data) { logger("Veritabanindan bos veri dondu!"); return; }
            
            logger("Veri alindi: " + JSON.stringify(data));

            for(let i=1; i<=4; i++) {
                const nem = data[`nem${i}`] || 0;
                const pompa = data[`pompa${i}`] || 0;

                // Arayuz Guncelle
                document.getElementById(`n${i}`).innerText = nem;
                document.getElementById(`p${i}`).className = pompa == 1 ? 'dot active' : 'dot';

                // Grafik Guncelle
                const chart = charts[`c${i}`];
                if(chart) {
                    chart.data.datasets[0].data.push(nem);
                    if(chart.data.datasets[0].data.length > 20) chart.data.datasets[0].data.shift();
                    chart.update('none'); // Performans icin animasyonsuz guncelle
                } else {
                    logger(`Hata: charts['c${i}'] objesi bulunamadi!`);
                }
            }
        });
    </script>
</body>
</html>
