<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gezgin A.Ş. | Neon Sera Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
    
    :root {
      --bg-primary: #050608;
      --bg-secondary: #0d1117;
      --text-color: #e8eaf0;
      --text-muted: #aab0bf;
      --border-neon: #00f3ff;
      --neon-pink: #ff00ff;
      --neon-green: #39ff14;
      --neon-orange: #ff9d00;
      --card-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-primary);
      color: var(--text-color);
      overflow-x: hidden;
    }

    /* Neon Kart Stili */
    .neon-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(0, 243, 255, 0.3);
      box-shadow: var(--card-shadow);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .neon-card:hover {
      box-shadow: 0 0 25px rgba(0, 243, 255, 0.5);
      border-color: var(--border-neon);
    }

    /* Dinamik Renkler */
    .text-neon-blue { color: var(--border-neon); text-shadow: 0 0 8px var(--border-neon); }
    .text-neon-pink { color: var(--neon-pink); text-shadow: 0 0 8px var(--neon-pink); }
    .text-neon-green { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }

    /* Pompa LED */
    .pump-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #333; transition: all 0.3s;
    }
    .pump-dot.on {
      background: var(--neon-green);
      box-shadow: 0 0 15px var(--neon-green);
    }

    /* Progress Bar */
    .neon-bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
    .neon-bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px inherit; }

    /* Küçük Grafik Alanı */
    .mini-chart-container { height: 120px; width: 100%; margin-top: 1rem; }

    /* Footer Sabitleme */
    footer {
      border-top: 1px solid rgba(0, 243, 255, 0.2);
      background: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <div class="max-w-[1400px] mx-auto px-6 py-8 pb-32">
    
    <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-12">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-neon-blue">Arduino Sensör Dashboardu</h1>
        <p class="text-muted mt-1 text-sm">Gezgin A.Ş. Akıllı Sera Operasyon Merkezi</p>
      </div>
      <div class="flex items-center gap-4">
        <div id="connBadge" class="flex items-center gap-2 px-4 py-2 rounded-full border border-gray-700 bg-black/50">
          <div id="connDot" class="pump-dot"></div>
          <span id="connText" class="text-xs font-bold uppercase tracking-widest">Bekleniyor</span>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-8">
      
      <div class="neon-card p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-lg uppercase tracking-wider">Saksı 01</h3>
          <div class="flex items-center gap-2">
            <div id="p1-dot" class="pump-dot"></div>
            <span class="text-[10px] font-bold text-muted uppercase">PUMP</span>
          </div>
        </div>
        <div class="text-4xl font-black text-neon-blue mb-2" id="n1-text">0%</div>
        <div class="neon-bar-bg mb-4">
          <div id="n1-bar" class="neon-bar-fill" style="background: var(--border-neon);"></div>
        </div>
        <div class="mini-chart-container">
          <canvas id="chart1"></canvas>
        </div>
      </div>

      <div class="neon-card p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-lg uppercase tracking-wider">Saksı 02</h3>
          <div class="flex items-center gap-2">
            <div id="p2-dot" class="pump-dot"></div>
            <span class="text-[10px] font-bold text-muted uppercase">PUMP</span>
          </div>
        </div>
        <div class="text-4xl font-black text-neon-pink mb-2" id="n2-text">0%</div>
        <div class="neon-bar-bg mb-4">
          <div id="n2-bar" class="neon-bar-fill" style="background: var(--neon-pink);"></div>
        </div>
        <div class="mini-chart-container">
          <canvas id="chart2"></canvas>
        </div>
      </div>

      <div class="neon-card p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-lg uppercase tracking-wider">Saksı 03</h3>
          <div class="flex items-center gap-2">
            <div id="p3-dot" class="pump-dot"></div>
            <span class="text-[10px] font-bold text-muted uppercase">PUMP</span>
          </div>
        </div>
        <div class="text-4xl font-black text-neon-green mb-2" id="n3-text">0%</div>
        <div class="neon-bar-bg mb-4">
          <div id="n3-bar" class="neon-bar-fill" style="background: var(--neon-green);"></div>
        </div>
        <div class="mini-chart-container">
          <canvas id="chart3"></canvas>
        </div>
      </div>

      <div class="neon-card p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-lg uppercase tracking-wider">Saksı 04</h3>
          <div class="flex items-center gap-2">
            <div id="p4-dot" class="pump-dot"></div>
            <span class="text-[10px] font-bold text-muted uppercase">PUMP</span>
          </div>
        </div>
        <div class="text-4xl font-black text-neon-orange mb-2" id="n4-text">0%</div>
        <div class="neon-bar-bg mb-4">
          <div id="n4-bar" class="neon-bar-fill" style="background: var(--neon-orange);"></div>
        </div>
        <div class="mini-chart-container">
          <canvas id="chart4"></canvas>
        </div>
      </div>

    </div>
  </div>

  <footer class="fixed bottom-0 left-0 w-full p-4 z-50">
    <div class="max-w-[1400px] mx-auto flex flex-wrap justify-center gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-muted">
      <div class="flex items-center gap-2"><span class="text-neon-blue">●</span> Bağlantı: <span id="f-conn" class="text-white">Çevrimdışı</span></div>
      <div class="flex items-center gap-2"><span class="text-neon-pink">●</span> Gelen Veri: <span id="f-count" class="text-white">0</span></div>
      <div class="flex items-center gap-2"><span class="text-neon-green">●</span> Son Güncelleme: <span id="f-time" class="text-white">—</span></div>
      <div class="flex items-center gap-2"><span class="text-neon-orange">●</span> Sistem: <span class="text-white">V2 NEON</span></div>
    </div>
  </footer>

  <script>
    // Firebase Config
    const firebaseConfig = {
      databaseURL: "https://bilsem1717-60b7a-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const charts = {};
    const chartConfigs = [
      { id: 'chart1', color: '#00f3ff' },
      { id: 'chart2', color: '#ff00ff' },
      { id: 'chart3', color: '#39ff14' },
      { id: 'chart4', color: '#ff9d00' }
    ];

    // Grafikleri Başlat
    chartConfigs.forEach(conf => {
      const ctx = document.getElementById(conf.id).getContext('2d');
      charts[conf.id] = new Chart(ctx, {
        type: 'line',
        data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: conf.color, tension: 0.4, pointRadius: 0, borderWidth: 2 }] },
        options: { 
          responsive: true, maintainAspectRatio: false, animation: false,
          plugins: { legend: { display: false } },
          scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }
        }
      });
    });

    let dataCounter = 0;

    // Firebase Canlı Dinleme
    database.ref('/veriler').on('value', (snapshot) => {
      const val = snapshot.val();
      if (!val) return;

      dataCounter++;
      document.getElementById('connDot').className = 'pump-dot on';
      document.getElementById('connText').textContent = 'Live';
      document.getElementById('f-conn').textContent = 'Firebase Canlı';
      document.getElementById('f-count').textContent = dataCounter;
      document.getElementById('f-time').textContent = new Date().toLocaleTimeString();

      // 4 Saksı Güncelleme Döngüsü
      for (let i = 1; i <= 4; i++) {
        const nem = val[`nem${i}`] || 0;
        const pump = val[`pompa${i}`] || 0;

        // UI Güncelle
        document.getElementById(`n${i}-text`).textContent = nem + '%';
        document.getElementById(`n${i}-bar`).style.width = nem + '%';
        document.getElementById(`p${i}-dot`).className = pump ? 'pump-dot on' : 'pump-dot';

        // Grafik Güncelle
        const chart = charts[`chart${i}`];
        chart.data.datasets[0].data.push(nem);
        if (chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
        chart.update('none');
      }
    });
  </script>
</body>
</html>
