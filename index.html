<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BİLSEM SERA PROJESİ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <style>
        :root {
            --bg: #050505; --text: #ffffff; --border: rgba(255,255,255,0.1);
            --card-bg: rgba(20, 20, 20, 0.7);
            --c1: #00d2ff; --c2: #9d50bb; --c3: #00ff88; --c4: #ff3333;
        }

        body.light-mode {
            --bg: #e4e6eb; --text: #1a1a1a; --border: rgba(0,0,0,0.15);
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(128,128,128,0.15) 1px, transparent 0);
            background-size: 30px 30px;
            font-family: 'Segoe UI', sans-serif; color: var(--text); margin: 0; padding-bottom: 50px;
            transition: 0.3s;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: var(--card-bg); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        .conn-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #555; transition: 0.3s; }
        .dot.online { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
        
        .theme-btn {
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-left: 15px;
        }

        .main-container { max-width: 1200px; margin: 0 auto; padding: 25px; }
        .grid-2x2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .card {
            background: var(--card-bg); border: 2px solid var(--border);
            border-radius: 20px; padding: 20px; transition: 0.4s;
        }

        .card-1 { border-color: rgba(0, 210, 255, 0.2); } .card-1:hover { border-color: var(--c1); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        .card-2 { border-color: rgba(157, 80, 187, 0.2); } .card-2:hover { border-color: var(--c2); box-shadow: 0 0 20px rgba(157, 80, 187, 0.2); }
        .card-3 { border-color: rgba(0, 255, 136, 0.2); } .card-3:hover { border-color: var(--c3); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        .card-4 { border-color: rgba(255, 51, 51, 0.2); } .card-4:hover { border-color: var(--c4); box-shadow: 0 0 20px rgba(255, 51, 51, 0.2); }

        .main-data { display: flex; align-items: center; gap: 20px; margin: 15px 0; }
        .nem-val { font-size: 56px; font-weight: 900; }
        
        .nem-bar-bg { width: 15px; height: 80px; background: rgba(128,128,128,0.2); border-radius: 10px; overflow: hidden; display: flex; align-items: flex-end;}
        .nem-bar-fill { width: 100%; height: 0%; transition: 0.5s ease-out; }

        .chart-wrapper { width: 100%; height: 100px; position: relative; margin-top: 10px; }

        .long-card {
            margin-top: 20px; display: flex; justify-content: space-around; align-items: center;
            font-size: 13px; color: #ff8800; font-weight: bold; border-color: rgba(255, 136, 0, 0.3); padding: 20px;
        }
        .info-item span { color: var(--text); margin-left: 5px; }

        @media (max-width: 768px) { .grid-2x2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:#ff8800; margin:0;">⚡ BİLSEM SERA</h2>
        <div class="conn-box">
            <div id="main-dot" class="dot"></div>
            <span id="main-text">BAĞLANTI BEKLENİYOR...</span>
            <button class="theme-btn" onclick="document.body.classList.toggle('light-mode')">🌓 Tema</button>
        </div>
    </div>

    <div class="main-container">
        <div class="grid-2x2">
            <div class="card card-1">
                <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.7;"><span>ÜNİTE_01</span> <span>SU AKTARIMI <div id="p1" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n1">0</div><small style="color:var(--c1); font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b1" class="nem-bar-fill" style="background:var(--c1)"></div></div>
                </div>
                <div class="chart-wrapper"><canvas id="c1"></canvas></div>
            </div>

            <div class="card card-2">
                <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.7;"><span>ÜNİTE_02</span> <span>SU AKTARIMI <div id="p2" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n2">0</div><small style="color:var(--c2); font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b2" class="nem-bar-fill" style="background:var(--c2)"></div></div>
                </div>
                <div class="chart-wrapper"><canvas id="c2"></canvas></div>
            </div>

            <div class="card card-3">
                <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.7;"><span>ÜNİTE_03</span> <span>SU AKTARIMI <div id="p3" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n3">0</div><small style="color:var(--c3); font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b3" class="nem-bar-fill" style="background:var(--c3)"></div></div>
                </div>
                <div class="chart-wrapper"><canvas id="c3"></canvas></div>
            </div>

            <div class="card card-4">
                <div style="display:flex; justify-content:space-between; font-size:12px; opacity:0.7;"><span>ÜNİTE_04</span> <span>SU AKTARIMI <div id="p4" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n4">0</div><small style="color:var(--c4); font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b4" class="nem-bar-fill" style="background:var(--c4)"></div></div>
                </div>
                <div class="chart-wrapper"><canvas id="c4"></canvas></div>
            </div>
        </div>

        <div class="card long-card">
            <div class="info-item">SİSTEM DURUMU: <span id="f-durum">BEKLİYOR...</span></div>
            <div class="info-item">GELEN PAKET: <span id="f-paket">0</span></div>
            <div class="info-item">SİSTEM: <span>LGS.OS V2.7 (FULL ENGINE)</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bilsem1717-60b7a-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);

        const charts = {};
        const renkler = ['#00d2ff', '#9d50bb', '#00ff88', '#ff3333'];

        const createChart = (id, color) => {
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        data: [], borderColor: color, backgroundColor: color + '15',
                        fill: true, tension: 0.4, pointRadius: 0, borderWidth: 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }
                }
            });
        };

        ['c1', 'c2', 'c3', 'c4'].forEach((id, i) => createChart(id, renkler[i]));

        let count = 0;
        firebase.database().ref('/veriler').on('value', (s) => {
            const d = s.val(); if(!d) return;
            count++;
            document.getElementById('main-dot').className = 'dot online';
            document.getElementById('main-text').innerText = 'BAĞLANDI';
            document.getElementById('f-paket').innerText = count;

            for(let i=1; i<=4; i++) {
                const n = d[`nem${i}`] || 0;
                const p = d[`pompa${i}`] || 0;

                document.getElementById(`n${i}`).innerText = n;
                document.getElementById(`b${i}`).style.height = n + '%';
                document.getElementById(`p${i}`).className = p == 1 ? 'dot online' : 'dot';

                const c = charts[`c${i}`];
                c.data.datasets[0].data.push(n);
                if(c.data.datasets[0].data.length > 15) c.data.datasets[0].data.shift();
                c.update();
            }
        });
    </script>
</body>
</html>
