<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>LED Kontrol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #0f1115;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      font-weight: 700;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: all .2s ease;
    }

    .off {
      background: #dc3545;
      color: white;
    }

    .on {
      background: #28a745;
      color: white;
      box-shadow: 0 0 25px rgba(40,167,69,.7);
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

<button id="ledBtn" class="off">LED AÇ</button>

<script>
  // 🔐 Supabase ayarları
  const supabaseUrl = "https://khaaelquexhoxwqbnhjs.supabase.co";
  const supabaseKey = "sb_publishable_w7s6RByp1vSE0gx-KnFLww_vY-78-qZ";
  const db = supabase.createClient(supabaseUrl, supabaseKey);

  let ledState = false;
  const btn = document.getElementById("ledBtn");

  btn.addEventListener("click", async () => {
    ledState = !ledState;

    // UI güncelle
    btn.className = ledState ? "on" : "off";
    btn.textContent = ledState ? "LED KAPAT" : "LED AÇ";

    // Supabase'e YENİ SATIR EKLE
    const { error } = await db
      .from("bilsemled")
      .insert([
        { led: ledState }
      ]);

    if (error) {
      console.error("Supabase hata:", error);
      alert("Supabase hata verdi, console'a bak");
    } else {
      console.log("LED durumu gönderildi:", ledState);
    }
  });
</script>

</body>
</html>
