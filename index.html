<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BİLSEM SERA PROJESİ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --primary: #ff8800;
            --primary-glow: rgba(255, 136, 0, 0.4);
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.8);
            --text: #ddd;
            --border: #222;
        }

        body.light-mode {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #222;
            --border: #ddd;
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text); margin: 0; padding-bottom: 120px; overflow-x: hidden;
        }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px); sticky; top: 0; z-index: 100;
        }

        .logo-area h2 { color: var(--primary); margin: 0; font-size: 22px; letter-spacing: 1px; }

        .conn-box { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 16px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff3333; position: relative; }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .status-dot.online::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: inherit; animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        .theme-btn { 
            background: none; border: 1px solid var(--border); color: var(--text); 
            cursor: pointer; padding: 8px; border-radius: 8px; font-size: 18px;
        }

        /* 2x2 GRID */
        .grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; padding: 20px; max-width: 1100px; margin: 0 auto;
        }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; transition: 0.3s;
            display: flex; flex-direction: column; overflow: hidden; /* Sağa taşmayı önler */
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .unit-name { font-size: 12px; opacity: 0.6; font-weight: bold; }
        .pump-label { font-size: 11px; display: flex; align-items: center; gap: 5px; }

        .nem-big { font-size: 48px; font-weight: 800; margin-bottom: 10px; }
        .nem-big small { font-size: 18px; color: var(--primary); margin-left: 4px; }

        /* GRAFİK KUTUSU - TAŞMA ÇÖZÜMÜ */
        .chart-wrapper {
            position: relative; height: 120px; width: 100%;
            background: rgba(0,0,0,0.1); border-radius: 10px; padding: 5px;
        }

        /* ALT BAR */
        .footer-info {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            border-top: 1px solid var(--border); padding: 15px;
            display: flex; justify-content: space-around; font-size: 11px; font-weight: bold;
        }

        @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <h2>⚡ BİLSEM SERA PROJESİ</h2>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="conn-box">
                <div id="stat-dot" class="status-dot"></div>
                <span id="stat-text">BAĞLANTI BEKLENİYOR...</span>
            </div>
            <button class="theme-btn" onclick="document.body.classList.toggle('light-mode')">🌓</button>
        </div>
    </div>

    <div class="grid-container">
        <div class="card">
            <div class="card-top"><span class="unit-name">ÜNİTE_01</span> <span class="pump-label">SU AKTARIMI <div id="p1" class="status-dot" style="width:8px; height:8px;"></div></span></div>
            <div class="nem-big"><span id="n1">0</span><small>%</small></div>
            <div class="chart-wrapper"><canvas id="c1"></canvas></div>
        </div>
        <div class="card">
            <div class="card-top"><span class="unit-name">ÜNİTE_02</span> <span class="pump-label">SU AKTARIMI <div id="p2" class="status-dot" style="width:8px; height:8px;"></div></span></div>
            <div class="nem-big"><span id="n2">0</span><small>%</small></div>
            <div class="chart-wrapper"><canvas id="c2"></canvas></div>
        </div>
        <div class="card">
            <div class="card-top"><span class="unit-name">ÜNİTE_03</span> <span class="pump-label">SU AKTARIMI <div id="p3" class="status-dot" style="width:8px; height:8px;"></div></span></div>
            <div class="nem-big"><span id="n3">0</span><small>%</small></div>
            <div class="chart-wrapper"><canvas id="c3"></canvas></div>
        </div>
        <div class="card">
            <div class="card-top"><span class="unit-name">ÜNİTE_04</span> <span class="pump-label">SU AKTARIMI <div id="p4" class="status-dot" style="width:8px; height:8px;"></div></span></div>
            <div class="nem-big"><span id="n4">0</span><small>%</small></div>
            <div class="chart-wrapper"><canvas id="c4"></canvas></div>
        </div>
    </div>

    <footer class="footer-info">
        <div>DURUM: <span id="f-durum" style="color:var(--primary)">BEKLEMEDE</span></div>
        <div>VERİ PAKETİ: <span id="f-paket" style="color:var(--primary)">0</span></div>
        <div>SON GÜNCELLEME: <span id="f-zaman" style="color:var(--primary)">--:--:--</span></div>
        <div>SİSTEM: <span style="color:var(--primary)">LGS.OS V2.2</span></div>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://bilsem1717-60b7a-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);

        const charts = {};
        const setupChart = (id) => {
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        data: [], borderColor: '#ff8800', backgroundColor: 'rgba(255, 136, 0, 0.05)',
                        fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }
                }
            });
        };

        ['c1', 'c2', 'c3', 'c4'].forEach(id => setupChart(id));

        let vSayac = 0;
        firebase.database().ref('/veriler').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            vSayac++;
            document.getElementById('stat-dot').className = 'status-dot online';
            document.getElementById('stat-text').innerText = 'BAĞLANDI';
            document.getElementById('f-durum').innerText = 'VERİ AKIYOR';
            document.getElementById('f-paket').innerText = vSayac;
            document.getElementById('f-zaman').innerText = new Date().toLocaleTimeString();

            for(let i=1; i<=4; i++) {
                const n = data[`nem${i}`] || 0;
                const p = data[`pompa${i}`] || 0;

                document.getElementById(`n${i}`).innerText = n;
                document.getElementById(`p${i}`).className = p == 1 ? 'status-dot online' : 'status-dot';

                const c = charts[`c${i}`];
                c.data.datasets[0].data.push(n);
                if(c.data.datasets[0].data.length > 20) c.data.datasets[0].data.shift();
                c.update('none');
            }
        });
    </script>
</body>
</html>
