<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BİLSEM SERA PROJESİ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --border: rgba(255,255,255,0.1);
            --card-bg: rgba(20, 20, 20, 0.7);
            --c1: #00d2ff; --c2: #9d50bb; --c3: #00ff88; --c4: #ff3333;
        }

        body.light-mode {
            --bg: #e4e6eb;
            --text: #1a1a1a;
            --border: rgba(0,0,0,0.15);
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(128,128,128,0.15) 1px, transparent 0);
            background-size: 30px 30px;
            font-family: 'Segoe UI', sans-serif; 
            color: var(--text); margin: 0; padding-bottom: 50px;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: var(--card-bg); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        .conn-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #555; transition: 0.3s; }
        .dot.online { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
        
        .theme-btn {
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 5px 10px; border-radius: 8px; cursor: pointer; margin-left: 15px;
            font-size: 16px; transition: 0.3s;
        }
        .theme-btn:hover { background: var(--border); }

        .main-container { max-width: 1200px; margin: 0 auto; padding: 25px; }

        .grid-2x2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .card {
            background: var(--card-bg); border: 2px solid var(--border);
            border-radius: 20px; padding: 20px; position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-1 { border-color: rgba(0, 210, 255, 0.3); } .card-1:hover { box-shadow: 0 0 25px rgba(0, 210, 255, 0.2); border-color: var(--c1); }
        .card-2 { border-color: rgba(157, 80, 187, 0.3); } .card-2:hover { box-shadow: 0 0 25px rgba(157, 80, 187, 0.2); border-color: var(--c2); }
        .card-3 { border-color: rgba(0, 255, 136, 0.3); } .card-3:hover { box-shadow: 0 0 25px rgba(0, 255, 136, 0.2); border-color: var(--c3); }
        .card-4 { border-color: rgba(255, 51, 51, 0.3); } .card-4:hover { box-shadow: 0 0 25px rgba(255, 51, 51, 0.2); border-color: var(--c4); }

        .card-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; opacity: 0.8; }
        
        .main-data { display: flex; align-items: center; gap: 20px; margin: 15px 0; }
        .nem-val { font-size: 56px; font-weight: 900; width: 100px; }
        
        .nem-bar-bg { width: 15px; height: 80px; background: rgba(128,128,128,0.2); border-radius: 10px; overflow: hidden; display: flex; align-items: flex-end;}
        .nem-bar-fill { width: 100%; height: 0%; transition: 0.5s ease-out; }

        /* KENDİ GRAFİK ALANIMIZ */
        .chart-container { 
            width: 100%; 
            height: 80px; 
            margin-top: 15px;
        }

        .long-card {
            margin-top: 20px; display: flex; justify-content: space-around; align-items: center;
            font-size: 13px; color: #ff8800; font-weight: bold; letter-spacing: 1px;
            border-color: rgba(255, 136, 0, 0.3); padding: 20px;
        }
        .long-card:hover { box-shadow: 0 0 25px rgba(255, 136, 0, 0.2); border-color: #ff8800; }
        .info-item span { color: var(--text); margin-left: 5px; }

        @media (max-width: 768px) { .grid-2x2 { grid-template-columns: 1fr; } .long-card { flex-direction: column; gap: 15px; text-align: center; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:#ff8800; margin:0;">⚡ BİLSEM SERA</h2>
        <div class="conn-box">
            <div id="main-dot" class="dot"></div>
            <span id="main-text">BAĞLANTI BEKLENİYOR...</span>
            <button class="theme-btn" onclick="document.body.classList.toggle('light-mode')">🌓 Tema</button>
        </div>
    </div>

    <div class="main-container">
        <div class="grid-2x2">
            <div class="card card-1">
                <div class="card-header"><span>ÜNİTE_01</span> <span>SU AKTARIMI <div id="p1" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n1">0</div><small style="color:var(--c1); font-size:20px; font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b1" class="nem-bar-fill" style="background:var(--c1)"></div></div>
                </div>
                <div class="chart-container"><canvas id="c1"></canvas></div>
            </div>

            <div class="card card-2">
                <div class="card-header"><span>ÜNİTE_02</span> <span>SU AKTARIMI <div id="p2" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n2">0</div><small style="color:var(--c2); font-size:20px; font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b2" class="nem-bar-fill" style="background:var(--c2)"></div></div>
                </div>
                <div class="chart-container"><canvas id="c2"></canvas></div>
            </div>

            <div class="card card-3">
                <div class="card-header"><span>ÜNİTE_03</span> <span>SU AKTARIMI <div id="p3" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n3">0</div><small style="color:var(--c3); font-size:20px; font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b3" class="nem-bar-fill" style="background:var(--c3)"></div></div>
                </div>
                <div class="chart-container"><canvas id="c3"></canvas></div>
            </div>

            <div class="card card-4">
                <div class="card-header"><span>ÜNİTE_04</span> <span>SU AKTARIMI <div id="p4" class="dot" style="display:inline-block; width:8px; height:8px;"></div></span></div>
                <div class="main-data">
                    <div class="nem-val" id="n4">0</div><small style="color:var(--c4); font-size:20px; font-weight:bold;">%</small>
                    <div class="nem-bar-bg"><div id="b4" class="nem-bar-fill" style="background:var(--c4)"></div></div>
                </div>
                <div class="chart-container"><canvas id="c4"></canvas></div>
            </div>
        </div>

        <div class="card long-card">
            <div class="info-item">SİSTEM DURUMU: <span id="f-durum">BEKLİYOR...</span></div>
            <div class="info-item">GELEN VERİ PAKETİ: <span id="f-paket">0</span></div>
            <div class="info-item">VERİTABANI: <span>FIREBASE REALTIME</span></div>
            <div class="info-item">CORE: <span>LGS.OS V2.5 (CUSTOM ENGINE)</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bilsem1717-60b7a-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);

        // KENDİ GRAFİK MOTORUMUZ (Brave Engelleyemez)
        const renkler = ['#00d2ff', '#9d50bb', '#00ff88', '#ff3333'];
        const grafikGecmisi = { 1: [], 2: [], 3: [], 4: [] };
        const maxNokta = 20;

        function ozelGrafikCiz(id, data, renk) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const kutu = canvas.parentElement;

            // Canvas'ı kutuya tam oturt
            canvas.width = kutu.clientWidth;
            canvas.height = kutu.clientHeight;
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);
            if (data.length < 2) return;

            ctx.beginPath();
            const adim = w / (maxNokta - 1);

            for (let i = 0; i < data.length; i++) {
                const x = i * adim;
                const y = h - (data[i] / 100 * h); // 100 üzerinden yüzde hesaplama
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            // Çizgi stili
            ctx.strokeStyle = renk;
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Altını hafif boyama
            ctx.lineTo((data.length - 1) * adim, h);
            ctx.lineTo(0, h);
            ctx.closePath();
            ctx.fillStyle = renk + '33'; // %20 şeffaflık
            ctx.fill();
        }

        let paketSayici = 0;
        firebase.database().ref('/veriler').on('value', (s) => {
            const d = s.val(); if(!d) return;
            
            paketSayici++;
            document.getElementById('main-dot').className = 'dot online';
            document.getElementById('main-text').innerText = 'BAĞLANDI';
            document.getElementById('main-text').style.color = '#00ff88';
            document.getElementById('f-durum').innerText = 'AKTİF - VERİ AKIYOR';
            document.getElementById('f-paket').innerText = paketSayici;

            for(let i=1; i<=4; i++) {
                const n = d[`nem${i}`] || 0;
                const p = d[`pompa${i}`] || 0;

                // Değerleri Yazdır
                document.getElementById(`n${i}`).innerText = n;
                document.getElementById(`p${i}`).className = p == 1 ? 'dot online' : 'dot';
                document.getElementById(`b${i}`).style.height = n + '%';

                // Grafiğe Veri Ekle ve Çizdir
                grafikGecmisi[i].push(n);
                if(grafikGecmisi[i].length > maxNokta) grafikGecmisi[i].shift(); // Eskileri sil
                
                ozelGrafikCiz(`c${i}`, grafikGecmisi[i], renkler[i-1]);
            }
        });

        // Ekran boyutu değişirse grafikleri bozmasın diye yeniden çiz
        window.addEventListener('resize', () => {
            for(let i=1; i<=4; i++) ozelGrafikCiz(`c${i}`, grafikGecmisi[i], renkler[i-1]);
        });
    </script>
</body>
</html>
